site_name: 钡铼技术资料库
site_description: Official documentation for ARMxy industrial edge gateways

# 主题：material 工业文档美观主题，外网展示效果好
theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    # 亮色模式下代码块自动深色
    - scheme: default
      primary: indigo
      accent: blue
      
# 导航栏目录，和你仓库 docs 下文件一一对应
nav:
  - 首页: index.md
  - 教程案例:
      - Node-red: 教程案例/Node-red.md
      - BLRAT: 教程案例/BLRAT.md
      - BLIoTLink: 教程案例/BLIoTLink.md
  - EdgePLC 边缘控制器:
      - 规格书: EdgePLC 边缘控制器/规格书.md
      - 说明书: EdgePLC 边缘控制器/说明书.md
  - ARMxy 边缘网关:
      - 规格书: ARMxy 边缘网关/规格书.md
      - 说明书: ARMxy 边缘网关/说明书.md
  - 软件产品:
      - BLRAT: 软件产品/BLRAT.md
      - EdgeCoder: 软件产品/EdgeCoder.md

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/translate.js
  - https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit
