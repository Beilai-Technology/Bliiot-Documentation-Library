site_name: 钡铼技术资料库
site_description: Official documentation for ARMxy industrial edge gateways

# 主题：material 工业文档美观主题，外网展示效果好
theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: assets/images/钡铼logo2024.png
  favicon: assets/images/钡铼logo2024.png
  palette:
    # 亮色模式下代码块自动深色
    - scheme: default
      primary: white
      accent: blue
      
# 导航栏目录，完全匹配仓库 docs 实际文件层级
nav:
  - 首页: index.md
  - 教程案例:
      - Node-RED: 教程案例/Node-red.md
      - BLRAT 远程运维: 教程案例/BLRAT.md
      - BLIoTLink 协议工具: 教程案例/BLIoTLink.md
  - 硬件产品:
      - ARMxy 边缘网关:
          - BL335 说明书: 硬件产品/ARMxy/BL335说明书.md
          - BL335 使用说明书: 硬件产品/ARMxy/BL335使用说明书.md
      - EdgePLC 边缘控制器:
          - BL245 规格书: 硬件产品/EdgePLC/BL245规格书.md
          - BL245 使用说明书: 硬件产品/EdgePLC/BL245使用说明书.md
  - 软件产品:
      - BLRAT: 软件产品/BLRAT.md
      - EdgeCoder: 软件产品/EdgeCoder.md
      - 软件产品总览: 软件产品/index.md

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/translate.js
  - https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit
